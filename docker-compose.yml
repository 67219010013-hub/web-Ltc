version: '3.8'

services:
  # 1. Database (MariaDB)
  db:
    container_name: hospital_db
    image: mariadb:10.6
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-hospital_db}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    restart: always

  # 2. Node.js Backend
  backend:
    container_name: hospital_backend
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_DATABASE=${DB_DATABASE:-hospital_db}
      - LTC_API_TOKEN=${LTC_API_TOKEN:-}
    depends_on:
      - db
    networks:
      - app-network
    restart: always

  # 3. Frontend Web Server (Nginx)
  frontend:
    container_name: hospital_frontend
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-8001}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    # ปรับแต่ง Nginx ให้เปิดหน้า frontend.html เป็นหน้าแรกทันทีโดยไม่ต้องเปลี่ยนชื่อไฟล์
    command: /bin/sh -c "sed -i 's/index  index.html index.htm;/index  frontend.html index.html index.htm;/g' /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"
    networks:
      - app-network
    restart: always

  # 4. Database UI Manager (phpMyAdmin)
  phpmyadmin:
    container_name: hospital_pma
    image: phpmyadmin/phpmyadmin
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: ${DB_HOST:-db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    depends_on:
      - db
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
