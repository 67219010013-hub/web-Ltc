version: '3.8'

services:
  # 1. Database (MariaDB)
  db:
    container_name: hospital_db
    image: mariadb:10.6
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-hospital_db}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    restart: always

  # 2. Node.js Backend
  backend:
    container_name: hospital_backend
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_DATABASE=${DB_DATABASE:-hospital_db}
      - LTC_API_TOKEN=${LTC_API_TOKEN:-}
    depends_on:
      - db
    networks:
      - app-network
    restart: always

  # 3. Frontend Web Server (Nginx)
  frontend:
    container_name: hospital_frontend
    # 💡 สั่งให้บิลด์จากโฟลเดอร์ frontend แทนการดึงภาพสำเร็จรูป
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8001}:80"
    # ❌ ลบส่วน volumes เดิมออกไปทั้งหมดแล้ว
    networks:
      - app-network
    restart: always

  # 4. Database UI Manager (phpMyAdmin)
  phpmyadmin:
    container_name: hospital_pma
    image: phpmyadmin/phpmyadmin
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: ${DB_HOST:-db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    depends_on:
      - db
    networks:
      - app-network
    restart: always

  # 5. Portainer for Docker management
  portainer:
    container_name: hospital_portainer
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  portainer_data:
